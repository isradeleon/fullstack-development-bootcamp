<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Block vs Inline</title>
  <style>
    .border {
      border: black 1px solid;
    }
  </style>
</head>
<body>
  <h1>HTML Elements</h1>
  <h2>Block elements VS inline elements</h2>
  <h3>Block elements</h3>
  <p class = "border">This is a paragraph, p tag.</p>
  <div class = "border">This is a division, div tag.</div>
  <br>
  <h3>Inline elements</h3>
  <span class="border">Span elemeng, span tag</span>
  <a target="_blank" class="border" href="https://google.com">Google link</a>
  <small class="border">small tag</small>
  <strong class="border">strong tag</strong>
</body>
</html>
