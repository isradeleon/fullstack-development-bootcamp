<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Images</title>
</head>
<body>
  <h1>The img tag & its attributes</h1>
  <p>You can set either the with or the height of the img tag in its attributes to keep its aspect ratio (1280px width -> 600px):</p>
  <img width="600" src="https://cdn.mos.cms.futurecdn.net/NgKvu8G2coskQXj74MoKcE.jpg" alt="an image of Harry, Ron and Hermione">
  <br>
  <p>If you force both attributes to a different aspect ratio than the original, the image will distort:</p>
  <img height="300" width="300" src="https://cdn.mos.cms.futurecdn.net/NgKvu8G2coskQXj74MoKcE.jpg" alt="an image of Harry, Ron and Hermione">
</body>
</html>
