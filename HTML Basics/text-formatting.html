<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>Text formatting tags</h1>

  <!--Text formatting-->
  <p>This is <b>a bold text</b></p>
  <p>This is <i>an italic text</i></p>
  <p>This is <em>an emphasized text</em></p>
  <p>This is a <del>deleted text</del></p>
  <p>This is <ins>an inserted text</ins></p>
  <p>This is <u>an underlined text</u></p>
  <p>
    <small>And finally, this text is smaller than the rest.</small>
  </p>
</body>
</html>
